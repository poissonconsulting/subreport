  name: fledge-tag-on-merge
  on:
    pull_request:
      types: [closed]
      branches: [main, master]
  permissions:
    contents: write
  jobs:
    tag:
      if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'fledge-bump'
      uses: poissonconsulting/.github/.github/workflows/fledge-tag-on-merge.yml@f-fledge-automation
      secrets: inherit
